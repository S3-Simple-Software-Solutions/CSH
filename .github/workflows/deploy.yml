name: Deploy CSH

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Parse ALL_SECRETS
        id: vars
        env:
          ALL_SECRETS: ${{ secrets.ALL_SECRETS }}
        run: |
          printf '%s' "$ALL_SECRETS" > /tmp/secrets.env

          get() { grep "^$1=" /tmp/secrets.env | cut -d= -f2-; }

          echo "ngrok_host=$(get NGROK_HOST)"   >> $GITHUB_OUTPUT
          echo "ngrok_port=$(get NGROK_PORT)"   >> $GITHUB_OUTPUT
          echo "deploy_user=$(get DEPLOY_USER)" >> $GITHUB_OUTPUT

          # Decode SSH key from base64 (avoids multiline parsing)
          get DEPLOY_SSH_KEY_B64 | base64 -d > /tmp/deploy_key
          chmod 600 /tmp/deploy_key

          # Build .env content for the host
          {
            echo "DATABASE_URL=$(get DATABASE_URL)"
            echo "HEREDIANO_SMTP_HOST=$(get HEREDIANO_SMTP_HOST)"
            echo "HEREDIANO_SMTP_PORT=$(get HEREDIANO_SMTP_PORT)"
            echo "HEREDIANO_SMTP_SECURE=$(get HEREDIANO_SMTP_SECURE)"
            echo "HEREDIANO_MAIL_FROM=$(get HEREDIANO_MAIL_FROM)"
            echo "HEREDIANO_APP_URL=$(get HEREDIANO_APP_URL)"
            echo "HEREDIANO_SMTP_USER=$(get HEREDIANO_SMTP_USER)"
            echo "HEREDIANO_SMTP_PASS=$(get HEREDIANO_SMTP_PASS)"
          } > /tmp/app.env

      - name: Deploy via SSH (ngrok tunnel)
        run: |
          HOST=${{ steps.vars.outputs.ngrok_host }}
          PORT=${{ steps.vars.outputs.ngrok_port }}
          USER=${{ steps.vars.outputs.deploy_user }}

          # Copy .env to host
          scp -i /tmp/deploy_key \
              -P "$PORT" \
              -o StrictHostKeyChecking=no \
              /tmp/app.env \
              "$USER@$HOST:/home/tony/Desktop/APP_CSH/.env"

          # Pull, build, restart
          ssh -i /tmp/deploy_key \
              -p "$PORT" \
              -o StrictHostKeyChecking=no \
              "$USER@$HOST" bash <<'ENDSSH'
            set -e
            cd /home/tony/Desktop/APP_CSH
            echo "── pulling ──"
            git fetch origin main
            git reset --hard origin/main
            echo "── installing ──"
            npm ci
            echo "── building ──"
            npm run build
            echo "── ensuring service unit (ExecStart=npm start -> node dist-server/index.js) ──"
            mkdir -p ~/.config/systemd/user
            cat > ~/.config/systemd/user/csh.service <<'UNIT'
          [Unit]
          Description=CSH Herediano app
          After=network.target

          [Service]
          Type=simple
          WorkingDirectory=/home/tony/Desktop/APP_CSH
          EnvironmentFile=/home/tony/Desktop/APP_CSH/.env
          ExecStart=/bin/bash -lc 'npm start'
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=default.target
          UNIT
            systemctl --user daemon-reload
            echo "── restarting ──"
            systemctl --user enable csh.service
            systemctl --user restart csh.service
            systemctl --user status csh.service --no-pager
            echo "── health check ──"
            for attempt in {1..30}; do
              if curl --fail --silent --show-error http://127.0.0.1:8088/healthz; then
                echo "Health check passed"
                exit 0
              fi
              echo "Waiting for deployed app health... ($attempt/30)"
              sleep 2
            done
            echo "Health check failed"
            systemctl --user status csh.service --no-pager || true
            journalctl --user -u csh.service -n 100 --no-pager || true
            exit 1
          ENDSSH
